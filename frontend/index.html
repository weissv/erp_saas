<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <script>
      (function () {
        var supported = { ru: true, en: true, ja: true };
        var fallback = "ru";
        var stored = null;

        try {
          stored = window.localStorage.getItem("miraiEdu.language");
        } catch (error) {
          stored = null;
        }

        var candidates = [];

        if (stored) candidates.push(stored);
        if (navigator.languages) candidates = candidates.concat(navigator.languages);
        if (navigator.language) candidates.push(navigator.language);

        for (var i = 0; i < candidates.length; i += 1) {
          var candidate = String(candidates[i] || "").toLowerCase().split(/[-_]/)[0];
          if (supported[candidate]) {
            document.documentElement.lang = candidate;
            return;
          }
        }

        document.documentElement.lang = fallback;
      })();
    </script>
    <title>ERP</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/logo.png" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
